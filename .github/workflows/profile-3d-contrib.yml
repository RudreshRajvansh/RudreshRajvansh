name: update readme stats cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&hide_border=true&bg_color=0d1117&title_color=CE422B&icon_color=3DDC84&text_color=c9d1d9
          path: assets/stats.svg
          token: ${{ secrets.PROFILE_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add assets/stats.svg
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "update stats cards"
            git push
          fi

<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', Consolas, Monaco, monospace">
  <defs>
    <clipPath id="rounded2"><rect x="1" y="1" width="898" height="298" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#rounded2)">
    <rect width="900" height="300" fill="#0d1117"/>
    <rect width="900" height="32" fill="#161b22"/>
    <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="16" r="6" fill="#27c93f"/>

  </g>
  <rect x="1" y="1" width="898" height="298" rx="10" fill="none" stroke="#30363d"/>

  <text x="24" y="60" font-size="14" fill="#CE422B">$ cat BACKEND_BIBLE.md | grep -A1 "core loop"</text>

  <text x="40" y="92"  font-size="14" fill="#3DDC84">✓</text><text x="60" y="92"  font-size="14" fill="#c9d1d9">socket()            — bound &amp; listening</text>
  <text x="40" y="118" font-size="14" fill="#3DDC84">✓</text><text x="60" y="118" font-size="14" fill="#c9d1d9">bind() / listen()    — TCP echo, single client</text>
  <text x="40" y="144" font-size="14" fill="#3DDC84">✓</text><text x="60" y="144" font-size="14" fill="#c9d1d9">accept()             — connection handling</text>
  <text x="40" y="170" font-size="14" fill="#3DDC84">✓</text><text x="60" y="170" font-size="14" fill="#c9d1d9">F_SETFL O_NONBLOCK   — non-blocking fds</text>
  <text x="40" y="196" font-size="14" fill="#3DDC84">✓</text><text x="60" y="196" font-size="14" fill="#c9d1d9">epoll_ctl / epoll_wait — multi-client event loop</text>
  <text x="40" y="222" font-size="14" fill="#ffbd2e">…</text><text x="60" y="222" font-size="14" fill="#8b949e">HTTP/1.1 parsing     — in progress</text>

  <text x="24" y="260" font-size="13" fill="#6e7681">no Tokio · no async runtime · libc syscalls only</text>
  <text x="24" y="282" font-size="13" fill="#6e7681">~90-topic backend syllabus, tracked by demonstrated competence</text>

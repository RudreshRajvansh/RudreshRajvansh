<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="mrounded"><rect x="1" y="1" width="698" height="258" rx="10"/></clipPath>
    <radialGradient id="crabGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#e8623f"/>
      <stop offset="100%" stop-color="#CE422B"/>
    </radialGradient>
    <linearGradient id="botGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5be89a"/>
      <stop offset="100%" stop-color="#2fb86e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3DDC84" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#CE422B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#mrounded)">
    <rect width="700" height="260" fill="#0d1117"/>
    <ellipse cx="350" cy="130" rx="280" ry="130" fill="url(#glow)"/>
  </g>
  <rect x="1" y="1" width="698" height="258" rx="10" fill="none" stroke="#30363d"/>

  <!-- ground shadows -->
  <ellipse cx="235" cy="205" rx="58" ry="10" fill="#000000" opacity="0.35"/>
  <ellipse cx="470" cy="215" rx="42" ry="9" fill="#000000" opacity="0.35"/>

  <!-- Rust crab (original stylized construction, not the Ferris mark) -->
  <g transform="translate(235,160)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -7; 0 0" keyTimes="0;0.5;1" dur="3.1s" repeatCount="indefinite"/>

      <!-- legs -->
      <path d="M -30,18 Q -48,30 -58,42" stroke="#8a2c1c" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M -22,24 Q -36,38 -44,50" stroke="#8a2c1c" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M 30,18 Q 48,30 58,42" stroke="#8a2c1c" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M 22,24 Q 36,38 44,50" stroke="#8a2c1c" stroke-width="4" fill="none" stroke-linecap="round"/>

      <!-- claws -->
      <line x1="-38" y1="0" x2="-55" y2="-6" stroke="#CE422B" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="-58" cy="-8" rx="13" ry="10" fill="url(#crabGrad)"/>
      <line x1="38" y1="0" x2="55" y2="-6" stroke="#CE422B" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="58" cy="-8" rx="13" ry="10" fill="url(#crabGrad)"/>

      <!-- body -->
      <ellipse cx="0" cy="0" rx="46" ry="27" fill="url(#crabGrad)"/>
      <ellipse cx="-16" cy="-11" rx="15" ry="7" fill="#ffffff" opacity="0.16"/>

      <!-- eye stalks -->
      <line x1="-15" y1="-19" x2="-22" y2="-37" stroke="#CE422B" stroke-width="3" stroke-linecap="round"/>
      <line x1="15" y1="-19" x2="22" y2="-37" stroke="#CE422B" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-22" cy="-39" r="6.5" fill="#e8623f"/>
      <circle cx="22" cy="-39" r="6.5" fill="#e8623f"/>
      <circle cx="-22" cy="-39" r="2.6" fill="#0d1117"/>
      <circle cx="22" cy="-39" r="2.6" fill="#0d1117"/>
      <circle cx="-23.5" cy="-41" r="1" fill="#ffffff" opacity="0.85"/>
      <circle cx="20.5" cy="-41" r="1" fill="#ffffff" opacity="0.85"/>
    </g>
  </g>

  <!-- Android bot (original capsule construction, not the official mark) -->
  <g transform="translate(470,150)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" keyTimes="0;0.5;1" dur="2.7s" begin="0.4s" repeatCount="indefinite"/>

      <!-- antennae -->
      <line x1="-13" y1="-10" x2="-18" y2="-30" stroke="#2fb86e" stroke-width="3" stroke-linecap="round"/>
      <line x1="13" y1="-10" x2="18" y2="-30" stroke="#2fb86e" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-18" cy="-32" r="4.5" fill="#5be89a"/>
      <circle cx="18" cy="-32" r="4.5" fill="#5be89a"/>

      <!-- body -->
      <rect x="-36" y="-10" width="72" height="62" rx="30" fill="url(#botGrad)"/>
      <ellipse cx="-13" cy="5" rx="17" ry="11" fill="#ffffff" opacity="0.14"/>

      <!-- eyes -->
      <ellipse cx="-14" cy="18" rx="5.5" ry="7.5" fill="#0d1117"/>
      <ellipse cx="14" cy="18" rx="5.5" ry="7.5" fill="#0d1117"/>
      <circle cx="-15.5" cy="14" r="1.3" fill="#ffffff" opacity="0.8"/>
      <circle cx="12.5" cy="14" r="1.3" fill="#ffffff" opacity="0.8"/>
    </g>
  </g>
</svg>

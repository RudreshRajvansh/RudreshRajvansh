<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', Consolas, Monaco, monospace">
  <defs>
    <clipPath id="rounded"><rect x="1" y="1" width="898" height="258" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="900" height="260" fill="#0d1117"/>
    <rect width="900" height="32" fill="#161b22"/>
    <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="16" r="6" fill="#27c93f"/>
    <text x="450" y="20" text-anchor="middle" fill="#8b949e" font-size="12">rudresh@dev — zsh</text>
  </g>
  <rect x="1" y="1" width="898" height="258" rx="10" fill="none" stroke="#30363d"/>

  <text x="24" y="58" font-size="15" fill="#CE422B" opacity="0">$ whoami
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.3s" fill="freeze"/>
  </text>
  <text x="24" y="80" font-size="15" fill="#c9d1d9" opacity="0">  rudresh_rajvansh
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.3s" fill="freeze"/>
  </text>

  <text x="24" y="112" font-size="15" fill="#CE422B" opacity="0">$ cat stack.txt
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze"/>
  </text>
  <text x="24" y="134" font-size="15" fill="#3DDC84" opacity="0">  Android · Kotlin, Jetpack Compose
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.3s" fill="freeze"/>
  </text>
  <text x="24" y="156" font-size="15" fill="#CE422B" opacity="0">  Rust · raw syscalls, zero-dependency backend
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
  </text>

  <text x="24" y="188" font-size="15" fill="#8b949e" opacity="0">$ ./status --live
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
  </text>
  <text x="24" y="210" font-size="14" fill="#c9d1d9" opacity="0">  NEXUS        Rust/Axum   <tspan fill="#3DDC84">●</tspan> pilot running on GCP
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze"/>
  </text>
  <text x="24" y="230" font-size="14" fill="#c9d1d9" opacity="0">  E-Cell KIET  Kotlin      <tspan fill="#3DDC84">●</tspan> live on Play Store
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.3s" fill="freeze"/>
  </text>

  <rect x="24" y="240" width="9" height="14" fill="#c9d1d9" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.01;0.5;1" begin="3.4s" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>

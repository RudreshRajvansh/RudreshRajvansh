<svg viewBox="0 0 900 330" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', Consolas, Monaco, monospace">
  <defs>
    <clipPath id="rounded"><rect x="1" y="1" width="898" height="328" rx="10"/></clipPath>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CE422B"/>
      <stop offset="100%" stop-color="#3DDC84"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CE422B"/>
      <stop offset="100%" stop-color="#3DDC84"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="900" height="330" fill="#0d1117"/>
    <rect width="900" height="32" fill="#161b22"/>
    <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="16" r="6" fill="#27c93f"/>
    <text x="450" y="20" text-anchor="middle" fill="#8b949e" font-size="12">rudresh@dev — boot.sh</text>
    <rect x="0" y="32" width="900" height="3" fill="url(#accent)"/>
  </g>
  <rect x="1" y="1" width="898" height="328" rx="10" fill="none" stroke="#30363d"/>

  <text x="24" y="66" font-size="15" fill="#CE422B" opacity="0">$ whoami
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.25s" fill="freeze"/>
  </text>
  <text x="24" y="88" font-size="15" opacity="0">
    <tspan fill="#c9d1d9">  rudresh_rajvansh — </tspan><tspan fill="#3DDC84">android</tspan><tspan fill="#6e7681"> × </tspan><tspan fill="#CE422B">rust</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="0.55s" dur="0.25s" fill="freeze"/>
  </text>

  <text x="24" y="120" font-size="15" fill="#CE422B" opacity="0">$ ./boot --stack
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.25s" fill="freeze"/>
  </text>

  <text x="24" y="145" font-size="13" opacity="0">
    <tspan fill="#6e7681">[ 0.0014 ] </tspan><tspan fill="#c9d1d9">kotlin-runtime ................... </tspan><tspan fill="#3DDC84">OK</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="1.35s" dur="0.2s" fill="freeze"/>
  </text>
  <text x="24" y="167" font-size="13" opacity="0">
    <tspan fill="#6e7681">[ 0.0812 ] </tspan><tspan fill="#c9d1d9">jetpack-compose .................. </tspan><tspan fill="#3DDC84">OK</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.2s" fill="freeze"/>
  </text>
  <text x="24" y="189" font-size="13" opacity="0">
    <tspan fill="#6e7681">[ 0.2044 ] </tspan><tspan fill="#c9d1d9">rust-toolchain .................... </tspan><tspan fill="#3DDC84">OK</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="1.85s" dur="0.2s" fill="freeze"/>
  </text>
  <text x="24" y="211" font-size="13" opacity="0">
    <tspan fill="#6e7681">[ 0.3391 ] </tspan><tspan fill="#c9d1d9">syscalls: socket·bind·listen·accept·epoll </tspan><tspan fill="#3DDC84">OK</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.2s" fill="freeze"/>
  </text>
  <text x="24" y="233" font-size="13" opacity="0">
    <tspan fill="#6e7681">[ 0.5120 ] </tspan><tspan fill="#c9d1d9">tokio ............................. </tspan><tspan fill="#CE422B">not found (intentional)</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="2.35s" dur="0.2s" fill="freeze"/>
  </text>

  <text x="24" y="266" font-size="13" fill="#8b949e" opacity="0">$ cargo build --release
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.2s" fill="freeze"/>
  </text>
  <rect x="24" y="276" width="300" height="8" rx="4" fill="#21262d" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.95s" dur="0.15s" fill="freeze"/>
  </rect>
  <rect x="24" y="276" width="0" height="8" rx="4" fill="url(#barFill)">
    <animate attributeName="width" from="0" to="300" begin="3.1s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="24" y="308" font-size="13" fill="#3DDC84" opacity="0">Compiling... done ✓
    <animate attributeName="opacity" from="0" to="1" begin="4.3s" dur="0.25s" fill="freeze"/>
  </text>

  <text x="215" y="308" font-size="13" fill="#c9d1d9" opacity="0">$
    <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.1s" fill="freeze"/>
  </text>
  <rect x="228" y="296" width="9" height="14" fill="#c9d1d9" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.01;0.5;1" begin="4.7s" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
